<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Selection</title>
    <link rel="stylesheet" href="candidate-selection.css">
</head>
<body>
    <header>
        <h1>Select Your Candidate</h1>
    </header>
    <main class="candidate-container">
        <div class="candidate-card">
            <img src="https://via.placeholder.com/150" alt="Candidate 1">
            <h2>Candidate Name 1</h2>
            <p>Party A</p>
            <button class="vote-btn">Vote</button>
        </div>
        <div class="candidate-card">
            <img src="https://via.placeholder.com/150" alt="Candidate 2">
            <h2>Candidate Name 2</h2>
            <p>Party B</p>
            <button class="vote-btn">Vote</button>
        </div>
        <div class="candidate-card">
            <img src="https://via.placeholder.com/150" alt="Candidate 3">
            <h2>Candidate Name 3</h2>
            <p>Party C</p>
            <button class="vote-btn">Vote</button>
        </div>
    </main>
</body>
</html>
