<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Election Results - Online Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand mb-0 h1">Online Voting System</span>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div class="card-header bg-white">
              <h2 class="text-center my-2">Live Election Results</h2>
            </div>
            <div class="card-body">
              <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                  <span class="fw-bold">Candidate A</span>
                  <span>45% (450 Votes)</span>
                </div>
                <div class="progress" style="height: 25px;">
                  <div class="progress-bar bg-success" role="progressbar" style="width: 45%;"></div>
                </div>
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                  <span class="fw-bold">Candidate B</span>
                  <span>35% (350 Votes)</span>
                </div>
                <div class="progress" style="height: 25px;">
                  <div class="progress-bar bg-info" role="progressbar" style="width: 35%;"></div>
                </div>
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                  <span class="fw-bold">Candidate C</span>
                  <span>20% (200 Votes)</span>
                </div>
                <div class="progress" style="height: 25px;">
                  <div class="progress-bar bg-warning" role="progressbar" style="width: 20%;"></div>
                </div>
              </div>

              <hr>
              <div class="text-center mt-3">
                <p class="text-muted">Total Votes Cast: 1,000</p>
                <a href="index.html" class="btn btn-outline-primary">Back to Home</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
