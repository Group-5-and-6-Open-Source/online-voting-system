<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Voting System</title>

    <!-- Bootstrap 5 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container-fluid voting-container">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-lg-8">
          <div class="voting-card">
            <h1 class="voting-title">Online Voting System</h1>
            
            <!-- Poll Question -->
            <div class="poll-section">
              <h2 id="pollQuestion" class="poll-question">Loading poll...</h2>
              <p id="pollDescription" class="poll-description"></p>
            </div>

            <!-- Voting Options -->
            <div class="options-section" id="optionsContainer">
              <!-- Options will be dynamically inserted here -->
            </div>

            <!-- Results Section -->
            <div class="results-section mt-4" id="resultsSection" style="display: none;">
              <h3>Results</h3>
              <div id="resultsContainer">
                <!-- Results will be dynamically inserted here -->
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-section mt-4">
              <button id="submitBtn" class="btn btn-primary btn-lg">Submit Vote</button>
              <button id="viewResultsBtn" class="btn btn-secondary btn-lg ms-2" style="display: none;">View Results</button>
              <button id="resetBtn" class="btn btn-warning btn-lg ms-2" style="display: none;">Reset</button>
            </div>

            <!-- Status Message -->
            <div id="statusMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="app.js"></script>
  </body>
</html>
